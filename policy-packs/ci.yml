rules:
  - pattern: "terraform apply"
    action: block
    severity: critical
  - pattern: "vercel --prod"
    action: block
    severity: critical
  - pattern: "firebase deploy"
    action: block
    severity: critical
profiles:
  ci:
    low: allow
    medium: require_approval
    high: block
    critical: block
settings:
  defaultProfile: ci
  allowBaselinePatterns: false
baselineAllowPatterns: []
